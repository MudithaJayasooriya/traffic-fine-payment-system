
spring.application.name=demo


spring.datasource.url=jdbc:mysql://localhost:3306/traffic_fine_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# -------------------------------------------------------------------
# JWT & Admin Configurations
# -------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect